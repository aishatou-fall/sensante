<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SenSante - Pre-diagnostic</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-blue-600 text-white py-4 shadow-lg">
    <div class="max-w-4xl mx-auto px-4">
      <h1 class="text-2xl font-bold">SenSante</h1>
      <p class="text-blue-100 text-sm">Assistant pré-diagnostic médical</p>
    </div>
  </header>

  <!-- Contenu principal -->
  <main class="max-w-4xl mx-auto px-4 py-8">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- Colonne gauche : formulaire -->
      <div id="form-section" class="bg-white rounded-xl shadow-md p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-4">Symptômes du patient</h2>

        <!-- Age -->
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700 mb-1">Âge</label>
          <input type="number" id="age"
            class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
            placeholder="Ex: 28" min="0" max="120">
        </div>

        <!-- Sexe -->
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700 mb-1">Sexe</label>
          <select id="sexe" class="w-full border border-gray-300 rounded-lg p-2">
            <option value="F">Féminin</option>
            <option value="M">Masculin</option>
          </select>
        </div>

        <!-- Temperature -->
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700 mb-1">Température (°C)</label>
          <input type="number" id="temperature" step="0.1"
            class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
            placeholder="Ex: 38.5" min="35" max="42">
        </div>

        <!-- Tension -->
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700 mb-1">Tension systolique</label>
          <input type="number" id="tension_sys"
            class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
            placeholder="Ex: 120" min="60" max="250">
        </div>

        <!-- Symptomes -->
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700 mb-2">Symptômes</label>
          <div class="space-y-2">
            <label class="flex items-center">
              <input type="checkbox" id="toux" class="rounded text-blue-600 mr-2">
              <span class="text-gray-700">Toux</span>
            </label>
            <label class="flex items-center">
              <input type="checkbox" id="fatigue" class="rounded text-blue-600 mr-2">
              <span class="text-gray-700">Fatigue</span>
            </label>
            <label class="flex items-center">
              <input type="checkbox" id="maux_tete" class="rounded text-blue-600 mr-2">
              <span class="text-gray-700">Maux de tête</span>
            </label>
            <label class="flex items-center">
              <input type="checkbox" id="frissons" class="rounded text-blue-600 mr-2">
              <span class="text-gray-700">Frissons</span>
            </label>
            <label class="flex items-center">
              <input type="checkbox" id="nausee" class="rounded text-blue-600 mr-2">
              <span class="text-gray-700">Nausée</span>
            </label>
          </div>
        </div>

        <!-- Region -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Région</label>
          <select id="region" class="w-full border border-gray-300 rounded-lg p-2">
            <option value="Dakar">Dakar</option>
            <option value="Diourbel">Diourbel</option>
            <option value="Fatick">Fatick</option>
            <option value="Kaolack">Kaolack</option>
            <option value="Kédougou">Kédougou</option>
            <option value="Louga">Louga</option>
            <option value="Saint-Louis">Saint-Louis</option>
            <option value="Tambacounda">Tambacounda</option>
            <option value="Thiès">Thiès</option>
            <option value="Ziguinchor">Ziguinchor</option>
          </select>
        </div>

        <!-- Bouton -->
        <button onclick="diagnostiquer()"
          id="btn-diag"
          class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-200 shadow-md">
          Diagnostiquer
        </button>
      </div>

      <!-- Colonne droite : resultat -->
      <div id="result-section">
        <div class="bg-white rounded-xl shadow-md p-6 text-center text-gray-400">
          <p class="text-4xl mb-3">&#129658;</p>
          <p class="font-medium">Remplissez le formulaire</p>
          <p class="text-sm mt-1">puis cliquez sur Diagnostiquer</p>
        </div>
      </div>

    </div>
  </main>
  <div id="historique" class="max-w-4xl mx-auto px-4 pb-8"></div>

  <!-- Footer -->
  <footer class="text-center text-gray-400 text-sm py-4">
    SenSante v0.3 - ESP/UCAD - L2 GLSI 2026
  </footer>

  <script>
    const API_URL = "";
    const historique = [];

    async function diagnostiquer() {
      const patient = {
        age: parseInt(document.getElementById("age").value),
        sexe: document.getElementById("sexe").value,
        temperature: parseFloat(document.getElementById("temperature").value),
        tension_sys: parseInt(document.getElementById("tension_sys").value),
        toux: document.getElementById("toux").checked,
        fatigue: document.getElementById("fatigue").checked,
        maux_tete: document.getElementById("maux_tete").checked,
        frissons: document.getElementById("frissons").checked,
        nausee: document.getElementById("nausee").checked,
        region: document.getElementById("region").value
      };

      if (!patient.age || !patient.temperature || !patient.tension_sys) {
        afficherErreur("Veuillez remplir tous les champs.");
        return;
      }

      afficherChargement();

      try {
        const response = await fetch(API_URL + "/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(patient)
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.detail ? JSON.stringify(err.detail) : "Erreur serveur");
        }

        const resultat = await response.json();
        afficherResultat(resultat);

      } catch (error) {
        afficherErreur("Erreur de connexion : " + error.message);
      }
    }

    function afficherChargement() {
      const section = document.getElementById("result-section");
      section.innerHTML = `
        <div class="bg-white rounded-xl shadow-md p-6 text-center">
          <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
          <p class="text-gray-500">Analyse en cours...</p>
        </div>`;
    }

    function afficherResultat(r) {
      const couleurs = {
        paludisme: { bg: "bg-red-100",    text: "text-red-800",    bar: "bg-red-500",    badge: "bg-red-500" },
        grippe:    { bg: "bg-orange-100", text: "text-orange-800", bar: "bg-orange-500", badge: "bg-orange-500" },
        typhoide:  { bg: "bg-yellow-100", text: "text-yellow-800", bar: "bg-yellow-500", badge: "bg-yellow-500" },
        sain:      { bg: "bg-green-100",  text: "text-green-800",  bar: "bg-green-500",  badge: "bg-green-500" }
      };

      const c = couleurs[r.diagnostic] || couleurs["sain"];
      const pct = Math.round(r.probabilite * 100);
      const emojis = { paludisme: "🦟", grippe: "🤧", typhoide: "⚠️", sain: "✅" };
      const emoji = emojis[r.diagnostic] || "🩺";
      const section = document.getElementById("result-section");

      section.innerHTML = `
        <div class="bg-white rounded-xl shadow-md p-6">
          <h2 class="text-xl font-bold text-gray-800 mb-4">Résultat</h2>
          <div class="${c.bg} rounded-lg p-4 mb-4">
            <p class="text-sm text-gray-600">Diagnostic :</p>
            <p class="text-2xl font-bold ${c.text} uppercase mt-1">${emoji} ${r.diagnostic}</p>
          </div>
          <div class="mb-4">
            <div class="flex justify-between mb-1">
              <span class="text-sm text-gray-600">Probabilité</span>
              <span class="text-sm font-bold ${c.text}">${pct}%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-3">
              <div class="${c.bar} h-3 rounded-full transition-all duration-500" style="width: ${pct}%"></div>
            </div>
          </div>
          <div class="flex items-center gap-2 mb-3">
            <span class="${c.badge} text-white text-xs px-2 py-1 rounded-full">${r.confiance}</span>
            <span class="text-sm text-gray-600">confiance</span>
          </div>
          <div class="bg-gray-50 rounded-lg p-3">
            <p class="text-sm text-gray-700">${r.message}</p>
          </div>
        </div>`;

        historique.unshift({ diagnostic: r.diagnostic, probabilite: pct });
        if (historique.length > 5) historique.pop();

        let rows = historique.map(h => `
        <tr>
            <td class="border px-3 py-1">${h.diagnostic}</td>
            <td class="border px-3 py-1">${h.probabilite}%</td>
        </tr>`).join("");

        document.getElementById("historique").innerHTML = `
        <h3 class="font-bold text-gray-700 mt-6 mb-2">Historique des consultations</h3>
        <table class="w-full text-sm">
            <tr class="bg-gray-100">
            <th class="border px-3 py-1 text-left">Diagnostic</th>
            <th class="border px-3 py-1 text-left">Probabilité</th>
            </tr>
            ${rows}
        </table>`;
      
      demanderExplication(r);
    }

    async function demanderExplication(diagnostic_data) {
      const explainData = {
          diagnostic: diagnostic_data.diagnostic,
          probabilite: diagnostic_data.probabilite,
          age: parseInt(document.getElementById("age").value),
          sexe: document.getElementById("sexe").value,
          temperature: parseFloat(document.getElementById("temperature").value),
          region: document.getElementById("region").value
      };

      const section = document.getElementById("result-section");
      const explDiv = document.createElement("div");
      explDiv.id = "explication-zone";
      explDiv.innerHTML = `
          <div class="mt-4 bg-purple-50 rounded-lg p-4 border border-purple-200">
              <p class="text-sm text-purple-600 font-medium mb-2">Explication (Llama 3)</p>
              <p class="text-gray-500 text-sm animate-pulse">Génération en cours...</p>
          </div>`;
      section.querySelector(".bg-white").appendChild(explDiv);

      try {
          const response = await fetch(API_URL + "/explain", {
              method: "POST",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify(explainData)
          });
          if (response.ok) {
              const result = await response.json();
              explDiv.innerHTML = `
                  <div class="mt-4 bg-purple-50 rounded-lg p-4 border border-purple-200">
                      <p class="text-sm text-purple-600 font-medium mb-2">Explication (Llama 3)</p>
                      <p class="text-gray-700 text-sm leading-relaxed">${result.explication}</p>
                  </div>`;
          }
      } catch (error) {
          explDiv.innerHTML = `
              <div class="mt-4 bg-gray-50 rounded-lg p-3">
                  <p class="text-gray-400 text-sm">Explication non disponible.</p>
              </div>`;
      }
    }




    function afficherErreur(msg) {
      const section = document.getElementById("result-section");
      section.innerHTML = `
        <div class="bg-red-50 border border-red-200 rounded-xl p-6">
          <p class="text-red-700 font-medium">${msg}</p>
          <p class="text-red-500 text-sm mt-2">Vérifiez votre connexion et réessayez.</p>
        </div>`;
    }
  </script>

</body>
</html>
